<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 캘린더</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="notion-compact">
  <div class="page-shell">
    <section class="panel filter-bar">
      <div class="filter-bar__grid">
        <div class="filter-bar__row filter-bar__row--search">
          <label for="search-input">검색</label>
          <input id="search-input" type="search" placeholder="게임명, 개발사, 태그 검색">
        </div>
        <div class="filter-bar__row">
          <span>플랫폼</span>
          <div id="platform-filters" class="chip-row"></div>
        </div>
        <div class="filter-bar__actions">
          <button id="open-source-page" type="button" class="ghost-button notion-source-button">원본 보기</button>
          <button id="reset-filters" type="button" class="ghost-button">초기화</button>
          <span id="result-count" class="result-count">0개 게임</span>
        </div>
      </div>
    </section>

    <main class="layout">
      <section class="content">
        <div id="loading-state" class="panel message-panel">데이터를 불러오는 중입니다.</div>
        <div id="error-state" class="panel message-panel hidden"></div>
        <div id="empty-state" class="panel message-panel hidden">조건에 맞는 게임이 없습니다.</div>

        <section class="panel highlights-panel">
          <div class="highlights-panel__header">
            <div>
              <h3>가까운 출시작</h3>
              <p>선택한 월 기준으로 먼저 확인할 만한 일정을 모았습니다.</p>
            </div>
            <button id="toggle-highlights" type="button" class="ghost-button">접기</button>
          </div>
          <div id="highlights-list" class="highlights-list"></div>
        </section>

        <section class="panel calendar-panel">
          <div class="calendar-toolbar">
            <div class="calendar-toolbar__main">
              <div class="calendar-toolbar__title-group">
                <div class="calendar-toolbar__title-row">
                  <button id="prev-month" type="button" class="calendar-nav__button" aria-label="이전 월">‹</button>
                  <strong id="calendar-title">-</strong>
                  <button id="next-month" type="button" class="calendar-nav__button" aria-label="다음 월">›</button>
                </div>
              </div>
            </div>
            <div class="calendar-legend">
              <select id="year-select" class="filter-select calendar-select"></select>
              <div id="view-mode-filters" class="chip-row quick-status-filters"></div>
            </div>
          </div>
          <div class="calendar-weekdays">
            <span>일</span>
            <span>월</span>
            <span>화</span>
            <span>수</span>
            <span>목</span>
            <span>금</span>
            <span>토</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <section class="panel day-panel">
          <div class="day-panel__header">
            <div>
              <h3 id="day-title">날짜를 선택하세요</h3>
              <p id="day-summary">캘린더에서 날짜를 누르면 해당 일정이 나옵니다.</p>
            </div>
          </div>
          <div id="day-list" class="day-list"></div>
        </section>
      </section>
    </main>
  </div>

  <div id="detail-modal" class="modal hidden" aria-hidden="true">
    <div class="modal__backdrop" data-close-modal="true"></div>
    <div class="modal__dialog">
      <button id="close-modal" type="button" class="modal__close" aria-label="닫기">×</button>
      <article id="detail-content" class="detail-content">
        <div id="detail-image-slot"></div>
        <div class="detail-content__body">
          <div class="detail-content__header">
            <div class="detail-content__header-main">
              <div id="detail-kicker" class="detail-content__kicker"></div>
              <h3 id="detail-title"></h3>
              <p id="detail-subtitle" class="detail-content__subtitle"></p>
            </div>
            <div id="detail-primary-meta" class="detail-content__primary-meta"></div>
          </div>

          <dl class="detail-meta">
            <div>
              <dt>개발사</dt>
              <dd id="detail-developer">-</dd>
            </div>
            <div>
              <dt>유통사</dt>
              <dd id="detail-publisher">-</dd>
            </div>
            <div>
              <dt>출시일</dt>
              <dd id="detail-release-date">-</dd>
            </div>
          </dl>

          <div id="detail-tags" class="tag-row"></div>
          <div class="detail-description-block">
            <p id="detail-description" class="detail-content__description"></p>
            <button id="detail-description-toggle" type="button" class="ghost-button detail-description-toggle">더보기</button>
          </div>

          <div class="detail-links">
            <a id="detail-homepage" class="ghost-button hidden" target="_blank" rel="noopener noreferrer">홈페이지</a>
          </div>

          <section id="detail-video-section" class="detail-video-section hidden">
            <h4>영상</h4>
            <div class="detail-video-frame">
              <iframe
                id="detail-video-embed"
                title="게임 영상"
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
              ></iframe>
            </div>
          </section>
        </div>
      </article>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
